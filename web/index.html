<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="D'Sicario" />

    <title>D'Sicario</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
        background-color: #1a1a1a;
        overflow: auto;
      }

      /* ── Splash screen nativo ── aparece ANTES de que React cargue */
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 18vh;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }

      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #splash-logo {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        object-fit: contain;
        animation: pulse 1.8s ease-in-out infinite;
      }

      #splash-name {
        margin-top: 20px;
        color: #A80015;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      #splash-tagline {
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.45);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
      }

      #splash-dots {
        margin-top: 40px;
        display: flex;
        gap: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #A80015;
        animation: bounce 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.04); opacity: 0.85; }
      }

      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-10px); opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- ── Splash nativo: visible ANTES de que React arranque ── -->
    <div id="splash-screen">
      <img
        id="splash-logo"
        src="/assets/logo.png"
        onerror="this.style.display='none'"
        alt="D'Sicario Logo"
      />
      <div id="splash-name">D'Sicario</div>
      <div id="splash-tagline">Cargando tu experiencia...</div>
      <div id="splash-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- ── Root de React ── -->
    <div id="root"></div>

    <!-- Firebase Cloud Messaging (compat SDK via CDN para web push) -->
    <script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-messaging-compat.js"></script>
    <script>
      firebase.initializeApp({
        apiKey: "AIzaSyC-vXDqKvSotlNqS7ovqOSl5bXyL-HQnyw",
        authDomain: "dsicario-cd723.firebaseapp.com",
        projectId: "dsicario-cd723",
        storageBucket: "dsicario-cd723.firebasestorage.app",
        messagingSenderId: "758740272138",
        appId: "1:758740272138:web:fd1cace942a589f01d8bf3",
        measurementId: "G-1F5XJQFVJ7"
      });
    </script>

    <script>
      // Ocultar splash cuando React monta el primer componente
      // Se llama desde App.js o después de que el bundle está listo
      window.__hideSplash = function () {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(function () {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 450);
        }
      };

      // Safety fallback: si React tarda más de 8s, ocultar de todas formas
      setTimeout(function () {
        window.__hideSplash && window.__hideSplash();
      }, 8000);
    </script>
  </body>
</html>
